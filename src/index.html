<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дурак AI — трекер партии</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<header>
    <h1>🃏 Дурак AI <small>трекер + авто-совет</small></h1>
    <span id="advice" class="advice-box">—</span>
</header>

<main>
    <!-- ИНФО-ПАНЕЛЬ (всё считается автоматически) -->
    <section class="info-bar">
        <div>🂠 Колода: <b id="i-deck">24</b></div>
        <div> У соперника: <b id="i-opp">6</b></div>
        <div>🗑 Сброс: <b id="i-discard">0</b></div>
        <div id="i-phase">⚔ атака</div>
        <div>Ходит: <b id="i-attacker">Я</b></div>
        <div>Лимит пар: <b id="i-limit">5</b></div>
    </section>
    <div id="hand-warn" class="warn"></div>

    <!-- РЕЖИМ КЛИКА ПО ПАЛИТРЕ -->
    <section class="modes">
        <span>Клик по карте =</span>
        <button data-mode="hand"     class="active">🖐 в руку / из руки</button>
        <button data-mode="myPlace">🃏 я кладу на стол</button>
        <button data-mode="oppPlace">🃏 соперник кладёт</button>
        <button data-mode="transfer">🔁 перевод</button>
        <button data-mode="pursue">⤵ вдогонку</button>
    </section>

    <!-- ПАЛИТРА 36 КАРТ -->
    <section id="palette" class="palette"></section>

    <!-- КОЗЫРЬ + РОЛЬ -->
    <section class="row">
        <span>Козырь:</span>
        <button data-trump="0">♣</button>
        <button data-trump="1">♦</button>
        <button data-trump="2">♥</button>
        <button data-trump="3">♠</button>
        <span class="gap">Атакующий сейчас:</span>
        <button data-att="0">Я</button>
        <button data-att="1">Соперник</button>
    </section>

    <!-- СТОЛ -->
    <section>
        <h3>Стол</h3>
        <div id="table" class="table"></div>
    </section>

    <!-- ДЕЙСТВИЯ ПАРТИИ -->
    <section class="actions">
        <button id="btn-deal"  class="g">🎲 Новая раздача</button>
        <button id="btn-bito"  class="b">✅ Бито</button>
        <button id="btn-take-me"  class="r">📥 Я беру</button>
        <button id="btn-take-opp" class="r">📥 Соперник берёт</button>
        <button id="btn-pursue-done" class="y" style="display:none">⏭ Вдогонку закончена → добор</button>
        <button id="btn-undo"  class="k">↶ Undo</button>
    </section>

    <!-- СОВЕТ -->
    <section class="actions">
        <button id="btn-advice" class="g">🧠 Совет сейчас</button>
        <button id="btn-legal"  class="k">📋 Легальные ходы</button>
        <label><input type="checkbox" id="chk-auto" checked> авто-совет после каждого действия</label>
    </section>
</main>

<div id="toast" class="toast"></div>
<script src="renderer.js"></script>
</body>
</html>
