<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Дурак AI — Советник</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>🃏 Дурак AI</h1>
        <span id="engine-status">движок: загрузка...</span>
    </header>

    <main>
        <!-- Моя рука -->
        <section>
            <h2>Моя рука</h2>
            <div id="my-hand" class="card-grid"></div>
        </section>

        <!-- Параметры -->
        <section class="params">
            <div>
                <label>Козырь:</label>
                <button class="trump-btn" data-suit="clubs">♣</button>
                <button class="trump-btn" data-suit="diamonds">♦</button>
                <button class="trump-btn" data-suit="hearts">♥</button>
                <button class="trump-btn" data-suit="spades">♠</button>
            </div>
            <div>
                <label>Колода (ост.):</label>
                <input type="number" id="deck-count" value="24" min="0" max="36">
            </div>
            <div>
                <label>Карт у соперника:</label>
                <input type="number" id="opp-count" value="6" min="0" max="36">
            </div>
            <div>
                <label>Фаза:</label>
                <select id="phase-select">
                    <option value="attack">Атака</option>
                    <option value="defend">Защита</option>
                </select>
            </div>
            <div>
                <label>Атакующий:</label>
                <select id="attacker-select">
                    <option value="0">Я (бот)</option>
                    <option value="1">Соперник</option>
                </select>
            </div>
            <div>
                <label>
                    <input type="checkbox" id="first-trick"> Первый кон (лимит 5)
                </label>
            </div>
        </section>

        <!-- Стол -->
        <section>
            <h2>Стол</h2>
            <div id="table-pairs"></div>
            <div class="add-pair-row">
                <input id="atk-input" placeholder="атака: 7 clubs" size="12">
                <input id="def-input" placeholder="защита: K clubs" size="12">
                <button id="add-pair">＋ пара</button>
            </div>
        </section>

        <!-- Кнопки -->
        <section class="actions">
            <button id="btn-advice" class="btn-primary">🧠 Получить совет</button>
            <button id="btn-legal" class="btn-secondary">📋 Легальные ходы</button>
        </section>

        <!-- Результат -->
        <section>
            <div id="status"></div>
            <div id="result"></div>
            <div id="legal-moves" class="legal-list"></div>
        </section>
    </main>

    <script src="renderer.js"></script>
</body>
</html>
